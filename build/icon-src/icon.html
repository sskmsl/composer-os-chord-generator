<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  svg { display: block; }
  text {
    font-family: "Bodoni 72", "Didot", Georgia, "Times New Roman", serif;
  }
</style>
</head>
<body>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- ファッションブランドのロゴのような、太いハイコントラスト・セリフ体の
       モノグラム一文字のみ。装飾要素は排除しミニマルに -->
  <rect x="0" y="0" width="1024" height="1024" fill="#171018"/>
  <text
    x="512"
    y="700"
    text-anchor="middle"
    font-size="640"
    font-weight="700"
    fill="#f2e9dd"
    letter-spacing="-10"
  >C</text>
</svg>
</body>
</html>
